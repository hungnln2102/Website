<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảo trì hệ thống - Mavryk Premium</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0b1120;color:#e2e8f0;overflow:hidden;
    }
    .bg{position:fixed;inset:0;z-index:0}
    .bg::before{
      content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
      background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.12) 0%,transparent 50%),
                 radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.1) 0%,transparent 50%);
      animation:drift 20s ease-in-out infinite;
    }
    @keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-3%,2%)}}
    .container{
      position:relative;z-index:1;text-align:center;padding:2rem;max-width:520px;
    }
    .icon{
      width:80px;height:80px;margin:0 auto 1.5rem;
      border-radius:50%;
      background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(139,92,246,.2));
      display:flex;align-items:center;justify-content:center;
      animation:pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.85}}
    .icon svg{width:40px;height:40px;stroke:#60a5fa;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    h1{
      font-size:1.75rem;font-weight:700;margin-bottom:.75rem;
      background:linear-gradient(135deg,#60a5fa,#a78bfa);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    p{color:#94a3b8;line-height:1.7;font-size:1rem;margin-bottom:1.5rem}
    .status{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.5rem 1.25rem;border-radius:9999px;font-size:.875rem;font-weight:500;
      background:rgba(234,179,8,.1);color:#fbbf24;
      border:1px solid rgba(234,179,8,.2);
    }
    .dot{
      width:8px;height:8px;border-radius:50%;background:#fbbf24;
      animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .footer{margin-top:2.5rem;color:#475569;font-size:.8rem}
    .footer a{color:#60a5fa;text-decoration:none}
    .footer a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1>Hệ thống đang bảo trì</h1>
    <p>
      Chúng tôi đang nâng cấp hệ thống để mang đến trải nghiệm tốt hơn.<br>
      Vui lòng quay lại sau ít phút.
    </p>
    <div class="status">
      <span class="dot"></span>
      Đang bảo trì
    </div>
    <div class="footer">
      <p>&copy; 2026 Mavryk Premium &mdash; <a href="mailto:support@mavrykpremium.store">Liên hệ hỗ trợ</a></p>
    </div>
  </div>
</body>
</html>
