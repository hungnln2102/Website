name: website

services:
  api:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${SERVER_DOCKERFILE:-apps/server/Dockerfile}
    container_name: website-api
    env_file:
      - ./my-store/apps/server/.env.docker
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY:-172.17.0.1}"
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - default
      - admin_orderlist_db

  web:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${WEB_DOCKERFILE:-apps/web/Dockerfile}
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://api.mavrykpremium.com}
        VITE_API_URL: ${VITE_API_URL:-https://api.mavrykpremium.com}
    container_name: website-web
    ports:
      - "127.0.0.1:4001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - api
    restart: unless-stopped

networks:
  admin_orderlist_db:
    external: true
    name: admin_orderlist_app-network