name: website

services:
  api:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${SERVER_DOCKERFILE:-apps/server/Dockerfile}
    container_name: website-api
    env_file:
      - ./my-store/apps/server/.env
    # admin_orderlist publish :3001 ra HOST — trong container KHÔNG dùng 127.0.0.1:3001
    # Linux VPS: IP mặc định là gateway bridge (thường 172.17.0.1). Nếu sai: DOCKER_HOST_GATEWAY trong .env cạnh file compose
    #   docker network inspect bridge -f '{{(index .IPAM.Config 0).Gateway}}'
    # Chỉ cần khi dùng ADMIN_ORDERLIST_API_URL kiểu http://host.docker.internal:3001 (IP bridge)
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY:-172.17.0.1}"
    environment:
      NODE_ENV: production
      # KHÔNG ghi ADMIN_ORDERLIST_API_URL ở đây — dùng my-store/apps/server/.env để đặt đúng domain production
      # (vd. https://admin.mavrykpremium.com). Nếu ghi ở đây sẽ lại ghi đè env_file.
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    networks:
      - default
      # Cùng mạng với admin_orderlist-postgres → DATABASE_URL @postgres:5432 như backend admin
      - admin_orderlist_db

  web:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${WEB_DOCKERFILE:-apps/web/Dockerfile}
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://api.mavrykpremium.com}
        VITE_API_URL: ${VITE_API_URL:-https://api.mavrykpremium.com}
    container_name: website-web
    ports:
      - "127.0.0.1:4001:80"
    depends_on:
      - api
    restart: unless-stopped

networks:
  admin_orderlist_db:
    external: true
    # Tên mạng compose admin_orderlist (thư mục ~/apps/admin_orderlist): docker network ls | grep app-network
    name: admin_orderlist_app-network

