name: website

services:
  api:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${SERVER_DOCKERFILE:-apps/server/Dockerfile}
    container_name: website-api
    env_file:
      - ./my-store/apps/server/.env.docker
    # admin_orderlist publish :3001 ra HOST â€” trong container KHÃ”NG dÃ¹ng 127.0.0.1:3001
    # Linux VPS: IP máº·c Ä‘á»‹nh lÃ  gateway bridge (thÆ°á»ng 172.17.0.1). Náº¿u sai: DOCKER_HOST_GATEWAY trong .env cáº¡nh file compose
    #   docker network inspect bridge -f '{{(index .IPAM.Config 0).Gateway}}'
    # Chá»‰ cáº§n khi dÃ¹ng ADMIN_ORDERLIST_API_URL kiá»ƒu http://host.docker.internal:3001 (IP bridge)
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY:-172.17.0.1}"
    environment:
      NODE_ENV: production
      # KHÃ”NG ghi ADMIN_ORDERLIST_API_URL á»Ÿ Ä‘Ã¢y â€” dÃ¹ng my-store/apps/server/.env Ä‘á»ƒ Ä‘áº·t Ä‘Ãºng domain production
      # (vd. https://admin.mavrykpremium.com). Náº¿u ghi á»Ÿ Ä‘Ã¢y sáº½ láº¡i ghi Ä‘Ã¨ env_file.
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    networks:
      - default
      # CÃ¹ng máº¡ng vá»›i admin_orderlist-postgres â†’ DATABASE_URL @postgres:5432 nhÆ° backend admin
      - admin_orderlist_db

  web:
    build:
      context: ${BUILD_CONTEXT:-https://github.com/hungnln2102/Website.git#main:my-store}
      dockerfile: ${WEB_DOCKERFILE:-apps/web/Dockerfile}
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://api.mavrykpremium.com}
        VITE_API_URL: ${VITE_API_URL:-https://api.mavrykpremium.com}
    container_name: website-web
    ports:
      - "127.0.0.1:4001:80"
    depends_on:
      - api
    restart: unless-stopped

networks:
  admin_orderlist_db:
    external: true
    # TÃªn máº¡ng compose admin_orderlist (thÆ° má»¥c ~/apps/admin_orderlist): docker network ls | grep app-network
    name: admin_orderlist_app-network

