# Unified Nginx Configuration for Mavryk Projects
# Location: /etc/nginx/sites-available/mavryk-unified.conf

# =========================================================
# MAINTENANCE MODE
# =========================================================
# Bật/Tắt bảo trì:
#   Bật:  sudo touch /etc/nginx/maintenance_on && sudo nginx -s reload
#   Tắt:  sudo rm -f /etc/nginx/maintenance_on && sudo nginx -s reload
#
# Whitelist IP: thêm IP vào block geo $maintenance_whitelist bên dưới
# =========================================================

# Whitelist IPs – thêm IP của bạn vào đây (1 = bypass maintenance)
geo $maintenance_whitelist {
    default         0;
    # === THÊM IP WHITELIST Ở ĐÂY ===
    # 123.45.67.89    1;   # Ví dụ: IP nhà bạn
    # 10.0.0.0/8      1;   # Ví dụ: Internal network
    127.0.0.1       1;     # Localhost
    ::1             1;     # Localhost IPv6
    1.53.114.221    1;     # Admin home IP
}

# UPSTREAMS
upstream website_web {
    server 127.0.0.1:4001;
    keepalive 32;
}
upstream website_api { server 127.0.0.1:4000; }
upstream orderlist_frontend { server 127.0.0.1:8081; }
upstream orderlist_backend_api { server 127.0.0.1:3001; }
upstream orderlist_webhook { server 127.0.0.1:5000; }

# =========================================================
# HTTP -> HTTPS redirects (PORT 80)
# =========================================================
server {
    listen 80;
    server_name mavrykpremium.store www.mavrykpremium.store;
    # Force canonical www host on HTTP
    return 301 https://www.mavrykpremium.store$request_uri;
}

server {
    listen 80;
    server_name api.mavrykpremium.store;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name admin.mavrykpremium.store;
    return 301 https://$host$request_uri;
}

# =========================================================
# HTTPS (PORT 443)
# =========================================================

# FRONTEND - force canonical www

# Redirect non-www HTTPS to www
server {
    listen 443 ssl http2;
    server_name mavrykpremium.store;

    ssl_certificate     /etc/letsencrypt/live/admin.mavrykpremium.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mavrykpremium.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Trả luôn HSTS trên redirect để các tool nhận diện hỗ trợ HTTPS đầy đủ
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    return 301 https://www.mavrykpremium.store$request_uri;
}

# Main frontend on www
server {
    listen 443 ssl http2;
    server_name www.mavrykpremium.store;

    ssl_certificate     /etc/letsencrypt/live/admin.mavrykpremium.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mavrykpremium.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enforce HTTPS for SEO/security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Enable gzip compression for static assets (JS/CSS/HTML)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # --- Maintenance mode ---
    # Nếu file /etc/nginx/maintenance_on tồn tại VÀ IP không nằm trong whitelist → 503
    set $maintenance off;
    if (-f /etc/nginx/maintenance_on) {
        set $maintenance on;
    }
    if ($maintenance_whitelist) {
        set $maintenance off;
    }
    error_page 503 @maintenance;
    location @maintenance {
        root /var/www/maintenance;
        rewrite ^(.*)$ /maintenance.html break;
        internal;
    }
    # --- End maintenance mode ---

    # Product images - proxy to orderlist backend
    location /image_product/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    location /image_variant/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    location /image/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    # Trung tâm gói (/system/*) — luôn phục vụ SPA khi bật maintenance_on
    location ^~ /system {
        proxy_pass http://website_web;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    # Alias cũ trùng lib/constants isSystemHubPath (không nằm dưới /system)
    location ~ ^/(check-profile|otp|renew-adobe|netflix)$ {
        proxy_pass http://website_web;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        if ($maintenance = "on") {
            return 503;
        }
        proxy_pass http://website_web;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# BACKEND API
server {
    listen 443 ssl http2;
    server_name api.mavrykpremium.store;

    ssl_certificate     /etc/letsencrypt/live/admin.mavrykpremium.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mavrykpremium.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enforce HTTPS and enable compression
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Trung tâm gói — không chặn bởi maintenance_on (cùng upstream với location /)
    location ^~ /categories {
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ^~ /products {
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ^~ /api/fix-adobe {
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ^~ /api/netflix {
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ^~ /api/renew-adobe/public {
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # POST /activate chạy Playwright vài phút — mặc định 60s sẽ cắt kết nối dù backend vẫn xử lý
        proxy_connect_timeout 660s;
        proxy_send_timeout 660s;
        proxy_read_timeout 660s;
    }

    location / {
        # Maintenance mode – block API too for non-whitelisted IPs
        set $api_maint off;
        if (-f /etc/nginx/maintenance_on) {
            set $api_maint on;
        }
        if ($maintenance_whitelist) {
            set $api_maint off;
        }
        if ($api_maint = "on") {
            return 503;
        }
        proxy_pass http://website_api;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ADMIN (Hệ thống quản lý)
server {
    listen 443 ssl http2;
    server_name admin.mavrykpremium.store;

    client_max_body_size 100M;

    ssl_certificate     /etc/letsencrypt/live/admin.mavrykpremium.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mavrykpremium.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enforce HTTPS and enable compression
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    location / {
        proxy_pass http://orderlist_frontend;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /image/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    location /image_product/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    location /image_variant/ {
        proxy_pass http://orderlist_backend_api;
        include /etc/nginx/proxy_params;
    }

    location = /webhook {
        proxy_pass http://orderlist_webhook/api/payment/notify;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
    }

    location ^~ /bot/payment_sepay/ {
        rewrite ^/bot/payment_sepay/.*$ /api/payment/notify break;
        proxy_pass http://orderlist_webhook;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
    }
}
