<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6‑Digit Login Code – VIVA</title>
    <link rel="stylesheet" href="style.css?v=1782019795">
</head>
<body>
    <header class="main-header">
        <h1><a href="index.php">VIVA</a></h1>
        <nav><a href="index.php">Go Back</a></nav>
    </header>
    <main class="content-wrapper">
        <div class="content-box">
            <h2>6‑Digit Login Code</h2>
            <p>Enter your email address to fetch the latest 6‑digit login code from our system.</p>
            
                            <div class="countdown-box">
                    <p>Wait <span id="countdown">25</span> seconds before submitting</p>
                </div>
                <form class="main-form" method="POST" action="six_digit_login.php">
                    <fieldset id="form-fieldset" disabled>
                        <div class="form-group">
                            <label for="user_email">Your Email Address</label>
                            <input type="email" id="user_email" name="user_email" required>
                        </div>
                        <button type="submit" class="btn-primary">Fetch Code</button>
                    </fieldset>
                </form>
                        
                        
                        
                    </div>
    </main>
    <footer>
        <p>&copy; 2026 VIVA. All rights reserved.</p>
    </footer>
    <script>
        (function() {
            let countdown = 25;
            const cd = document.getElementById('countdown');
            const fset = document.getElementById('form-fieldset');
            const timer = setInterval(function() {
                countdown--;
                cd.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(timer);
                    document.querySelector('.countdown-box').style.display = 'none';
                    fset.disabled = false;
                }
            }, 1000);
        })();
    </script>
</body>
</html>
