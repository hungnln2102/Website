server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  etag on;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  location = /assets/images/favicon {
    try_files
      $uri.ico
      $uri.png
      $uri.svg
      $uri.webp
      $uri.jpg
      $uri.jpeg
      $uri.avif
      =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ^~ /assets/images/ {
    try_files
      $uri
      $uri.webp
      $uri.png
      $uri.jpg
      $uri.jpeg
      $uri.svg
      $uri.ico
      $uri.avif
      =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location = /index.html {
    expires 60s;
    add_header Cache-Control "public, max-age=60, must-revalidate, stale-while-revalidate=300" always;
    try_files $uri =404;
  }

  location = /index.php {
    return 301 /;
  }

  location ~ \.php$ {
    return 404;
  }

  location / {
    expires 60s;
    add_header Cache-Control "public, max-age=60, must-revalidate, stale-while-revalidate=300" always;
    try_files $uri $uri/ /index.html;
  }
}
